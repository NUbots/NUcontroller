; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
src_dir = .
include_dir = Core/Inc

[env:nucleo_h753zi]
platform = ststm32
board = nucleo_h753zi
framework = stm32cube
platform_packages =
	toolchain-gccarmnoneeabi@~1.120301.0

; Ensure C++20 headers (e.g. <bit>) are available/selected.
build_unflags =
	-std=gnu++11
	-std=gnu++14
	-std=gnu++17

; Compile all C/C++ sources under Core/Src recursively.
build_src_filter =
	+<Core/Src/**/*.c>
	+<Core/Src/**/*.cpp>
	+<USB_DEVICE/App/*.c>
	+<USB_DEVICE/Target/*.c>
	-<Core/Src/system_stm32h7xx.c>

; Make Core/Src module headers visible without changing include statements.
build_flags =
	-O2 ; optimize for speed - change this based on what you're up to :D
	-std=gnu++20
	-ICore/Src
	-ICore/Src/device
	-ICore/Src/dynamixel
	-ICore/Src/nusense
	-ICore/Src/uart
	-ICore/Src/usb
	-ICore/Src/utility
	-IUSB_DEVICE/App
	-IUSB_DEVICE/Target
	-IMiddlewares/ST/STM32_USB_Device_Library/Core/Inc
	-IMiddlewares/ST/STM32_USB_Device_Library/Class/CDC/Inc